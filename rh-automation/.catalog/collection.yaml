description: "Ansible Automation Platform governance, execution safety, and forensic troubleshooting tools for Red Hat automation engineers."
summary: |
  The rh-automation collection ships 11 catalogued skills for Red Hat automation workflows described in README and AGENTS.md; orchestration entries coordinate sub-skills with explicit approvals.
contents:

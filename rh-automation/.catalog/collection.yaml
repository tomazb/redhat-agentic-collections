  skills_decision_guide:
  - user_request: "\"Governance audit\" or \"production readiness\""
    skill_to_use: governance-assessor
    reason: "End-to-end governance assessment with summaries."
  - user_request: "\"Run job template\" with approvals"
    skill_to_use: governance-executor
    reason: "Validator, risk analysis, governed launch, and summary."
  - user_request: "\"Job failed\" root cause"
    skill_to_use: forensic-troubleshooter
    reason: "Failure analysis, host facts, resolution advice, summary."
  - user_request: "\"Validate AAP MCP\""

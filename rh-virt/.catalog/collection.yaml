  skills_decision_guide:
  - user_request: "\"Create VM\""
    skill_to_use: vm-create
    reason: "Instance types, OS selection, and OpenShift Virtualization CRs."
  - user_request: "\"List VMs\""
    skill_to_use: vm-inventory
    reason: "Namespace-scoped inventory and status."
  - user_request: "\"Snapshot\" backup"
    skill_to_use: vm-snapshot-create
    reason: "Validated snapshot creation for recovery points."
  - user_request: "\"Restore snapshot\""
    skill_to_use: vm-snapshot-restore

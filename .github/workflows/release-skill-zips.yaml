name: Package & Release Skill ZIPs

on:
  release:
    types: [published]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dependencies
        run: |
          source $HOME/.cargo/env
          make install

      - name: Package skills
        run: |
          source $HOME/.cargo/env
          uv run python scripts/package_skills.py

      - name: Update rolling latest release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          if ! ls dist/*.zip 1>/dev/null 2>&1; then
            echo "No ZIPs found in dist/, skipping release update"
            exit 1
          fi
          gh release delete latest --yes 2>/dev/null || true
          git tag -f latest
          git push origin latest --force
          gh release create latest dist/*.zip --title "Latest Skill Packs" --notes "Auto-updated on every merge to main. Download the ZIP for your pack." --latest

      - name: Upload release assets
        if: github.event_name == 'release' && github.event.release.tag_name != 'latest'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          find dist -name '*.zip' | while read zip; do
            gh release upload "$TAG" "$zip" --clobber
          done

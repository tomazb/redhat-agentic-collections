name: Skill Check Tier 2

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      validate_all:
        description: 'Validate all skills (true) or changed only (false)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  tier2-skill-check:
    if: github.event.pull_request.draft == false || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dependencies and validate structure
        run: |
          source $HOME/.cargo/env
          make install
          make validate-structure

      - name: Validate skills (Tier 2)
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
        run: |
          source $HOME/.cargo/env
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.validate_all }}" = "true" ]; then
            echo "Running Tier 2 on ALL skills (manual dispatch)..."
            uv run python scripts/validate_skills_tier2.py
          else
            ./scripts/ci-validate-changed-skills.sh tier2
          fi
